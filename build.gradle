plugins {
    id 'java-library'
    id 'maven-publish'
    // Используем актуальный плагин для Forge 1.21+
    id 'net.neoforged.gradle.userdev' version '7.0.147'
    id 'org.spongepowered.mixin' version '0.7-SNAPSHOT'
}

version = '1.0'
group = 'edu.unl.csce466'
archivesBaseName = 'csce466-mod'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

minecraft {
    accessTransformers {
        // file('src/main/resources/META-INF/accesstransformer.cfg')
    }
}

runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        modSource project.sourceSets.main
    }
    client { systemProperty 'neoforge.enabledGameTestNamespaces', 'examplemod' }
    server { systemProperty 'neoforge.enabledGameTestNamespaces', 'examplemod' }
}

dependencies {
    // В 1.21+ мы используем net.neoforged:neoforge
    implementation 'net.neoforged:neoforge:21.4.10'
    
    // Mixins
    annotationProcessor 'org.spongepowered:mixin:0.8.7:processor'

    // ImGui
    def imguiVersion = '1.86.10'
    ['binding', 'lwjgl3', 'natives-linux', 'natives-windows', 'natives-macos'].each {
        implementation "io.github.spair:imgui-java-$it:$imguiVersion"
    }
}

mixin {
    add sourceSets.main, 'forge-mixin.refmap.json'
    config 'forge-mixin.json'
}

jar {
    manifest {
        attributes([
            "Specification-Title": "examplemod",
            "Specification-Version": "1",
            "Implementation-Title": project.name,
            "Implementation-Version": project.version,
            "MixinConfigs": "forge-mixin.json"
        ])
    }
}
