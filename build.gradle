plugins {
    id 'eclipse'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0.24,6.2)'
}

version = '1.0'
group = 'edu.unl.csce466'
archivesBaseName = 'csce466-mod'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

jarJar.enable()

tasks.named('jarJar') {
	// ...
}
tasks.named('jarJar').configure {
	finalizedBy 'reobfJarJar'
}

minecraft {
    mappings channel: 'official', version: '1.21.4'

    runs {
        client {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'

            mods {
                examplemod {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run')

            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'

            mods {
                examplemod {
                    source sourceSets.main
                }
            }
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    mavenCentral()
    maven { url = "https://maven.minecraftforge.net" }
    maven { url "https://raw.githubusercontent.com/kotlin-graphics/mary/master" }
    maven { url 'https://repo.spongepowered.org/repository/maven-public/' }
    maven { url 'https://jitpack.io' }
}

ext {
    imguiVersion = '1.86.10'
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.21.4-52.0.28'

    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    // ImGui - exactly like your 1.19.2 mod (with JarJar)
    ['binding', 'lwjgl3', 'natives-linux', 'natives-windows', 'natives-macos'].each {
        minecraftLibrary (group: "io.github.spair", name: "imgui-java-${it}", version: "$imguiVersion") {
            exclude group: "org.lwjgl"
        }
        jarJar(group: "io.github.spair", name: "imgui-java-${it}", version: "[0,)") {
            transitive(false)
            exclude group: "org.lwjgl"
        }
    }
}

mixin {
    add sourceSets.main, 'forge-mixin.refmap.json'
    config 'forge-mixin.json'

    debug.verbose = true
    debug.export = true
}

jar {
    manifest {
        attributes([
                "Specification-Title"     : "examplemod",
                "Specification-Vendor"    : "examplemodsareus",
                "Specification-Version"   : "1",
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : "examplemodsareus",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"			  : "forge-mixin.json"
        ])
    }
    // from configurations.library.collect { it.isDirectory() ? it : zipTree(it) }
}

// Reobfuscate the final jar (same as your old mod)
jar.finalizedBy('reobfJar')

publishing {
	publications {
		mavenJava(MavenPublication) {
			artifact jar
		}
	}
	repositories {
		maven {
			url "file://${project.projectDir}/mcmodsrepo"
		}
	}
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = 'UTF-8'
}

tasks.withType(ProcessResources).configureEach {
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}
