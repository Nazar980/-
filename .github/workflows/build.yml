name: Build
on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    name: Build Fabric Mod
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build remapped mod jar
        run: ./gradlew --no-daemon --stacktrace clean shadowJar remapJar sourcesJar
      - name: Upload built mod jar
        uses: actions/upload-artifact@v4
        with:
          name: imguimc-build
          if-no-files-found: error
          retention-days: 14
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-dev.jar
            !build/libs/*-dev-shadow.jar
            !build/libs/*-all.jar
